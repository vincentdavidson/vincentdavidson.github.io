<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vincent Davidson</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #ffffff;
            color: #333;
            line-height: 1.6;
        }
        .container {
            max-width: 600px;
            margin: 100px auto;
            padding: 0 20px;
            text-align: center;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 30px;
        }
        .links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }
        a {
            color: #0066cc;
            text-decoration: none;
            transition: color 0.3s;
        }
        a:hover {
            color: #0052a3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Vincent Davidson</h1>
        <p class="subtitle">Developer & Creator</p>
        
        <div class="links">
            <a href="https://github.com/vincentdavidson">GitHub</a>
            <a href="https://twitter.com">Twitter</a>
            <a href="mailto:your.email@example.com">Email</a>
        </div>
    </div>
</body>
</html>
