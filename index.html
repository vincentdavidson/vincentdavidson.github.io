<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vincent Davidson</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #ffffff;
            color: #333;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
        }
        nav {
            display: flex;
            gap: 30px;
            justify-content: center;
            padding: 40px 0;
            border-bottom: 1px solid #eee;
            margin-bottom: 40px;
        }
        nav a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: color 0.3s;
        }
        nav a:hover {
            color: #0066cc;
        }
        nav a.active {
            color: #0066cc;
            border-bottom: 2px solid #0066cc;
            padding-bottom: 5px;
        }
        .section {
            display: none;
        }
        .section.active {
            display: block;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 30px;
            text-align: center;
        }
        .home-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }
        a {
            color: #0066cc;
            text-decoration: none;
            transition: color 0.3s;
        }
        a:hover {
            color: #0052a3;
        }
        .publication {
            background: #f9f9f9;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #0066cc;
            border-radius: 4px;
        }
        .publication h3 {
            margin-bottom: 10px;
            font-size: 1.2em;
        }
        .publication-meta {
            color: #666;
            font-size: 0.95em;
            margin-bottom: 10px;
        }
        .publication-link {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 15px;
            background: #0066cc;
            color: white;
            border-radius: 4px;
            text-decoration: none;
            transition: background 0.3s;
        }
        .publication-link:hover {
            background: #0052a3;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="#" class="nav-link active" data-section="home">Home</a>
            <a href="#" class="nav-link" data-section="publications">Publications</a>
            <a href="#" class="nav-link" data-section="about">About</a>
        </nav>

        <!-- Home Section -->
        <section id="home" class="section active">
            <h1>Vincent Davidson</h1>
            <p class="subtitle">Researcher & Developer</p>
            <div class="home-links">
                <a href="https://github.com/vincentdavidson">GitHub</a>
                <a href="https://twitter.com">Twitter</a>
                <a href="mailto:your.email@example.com">Email</a>
            </div>
        </section>

        <!-- Publications Section -->
        <section id="publications" class="section">
            <h2>Publications</h2>
            <div class="publication">
                <h3>Publication Title</h3>
                <div class="publication-meta">
